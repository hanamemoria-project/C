<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Quicksand', sans-serif; }
        
        #main-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            z-index: 10000; transition: background 0.5s;
        }

        #stage { position: relative; width: 300px; height: 300px; }

        /* --- KARTU PESAN --- */
        #card {
            width: 260px; height: 210px; border-radius: 15px;
            position: absolute; top: 60px; left: 20px; z-index: 100;
            opacity: 0; transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: center; padding: 25px; box-sizing: border-box;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            pointer-events: none; border: 1px solid rgba(0,0,0,0.05);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        /* --- KARAKTER HEWAN --- */
        #animal {
            width: 75px; height: 75px; position: absolute; top: 45px; left: 112px; 
            z-index: 90; opacity: 0; transition: 0.8s; border-radius: 50% 50% 45% 45%;
            border: 3px solid #fff;
        }
        .ear { position: absolute; background: inherit; border: 2px solid #fff; z-index: -1; }

        /* --- AMPLOP --- */
        #envelope-set {
            width: 300px; height: 180px; position: absolute; bottom: 10px;
            z-index: 50; cursor: pointer;
        }
        #env-body { width: 100%; height: 100%; border-radius: 0 0 15px 15px; border: 2px solid #fff; position: relative; z-index: 52; }
        #flap {
            position: absolute; top: 0; left: 0; width: 0; height: 0;
            border-left: 150px solid transparent; border-right: 150px solid transparent;
            z-index: 53; transform-origin: top; transition: 0.6s;
        }

        /* --- STATE TERBUKA --- */
        .is-open #flap { transform: rotateX(180deg); z-index: 10; }
        .is-open #card { transform: translateY(-140px); opacity: 1; pointer-events: auto; }
        .is-open #animal { transform: translateY(-190px); opacity: 1; }

        /* --- TUTORIAL HP --- */
        #tutorial-ui {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: none; flex-direction: column; justify-content: center; align-items: center;
            z-index: 50000; text-align: center; color: white;
        }
        .phone-anim {
            width: 60px; height: 100px; border: 3px dashed white; border-radius: 10px;
            margin-bottom: 20px; animation: scan 2s infinite ease-in-out;
        }

        @keyframes scan {
            0%, 100% { transform: translateY(-10px); opacity: 0.5; }
            50% { transform: translateY(10px); opacity: 1; }
        }

        .title { font-family: 'Fredoka One', cursive; font-size: 19px; margin-bottom: 8px; color: #556b2f; }
        .msg { font-size: 13px; margin-bottom: 15px; line-height: 1.4; color: #444; }
        .btn { border: none; padding: 12px 25px; border-radius: 25px; font-weight: bold; cursor: pointer; display: none; }
    </style>
</head>
<body>

    <div id="main-container">
        <div id="stage">
            <div id="animal">
                <div id="ear-l" class="ear"></div>
                <div id="ear-r" class="ear"></div>
                <div style="width:6px;height:6px;background:#333;border-radius:50%;position:absolute;top:32px;left:20px;"></div>
                <div style="width:6px;height:6px;background:#333;border-radius:50%;position:absolute;top:32px;right:20px;"></div>
                <div style="width:10px;height:5px;border:2px solid #333;border-radius:0 0 10px 10px;border-top:0;position:absolute;top:48px;left:32px;"></div>
            </div>

            <div id="card">
                <p class="title" id="judul-txt"></p>
                <p class="msg" id="isi-txt"></p>
                <button class="btn" id="btn-next" onclick="handleSlide()"></button>
            </div>

            <div id="envelope-set" onclick="openEnvelope()">
                <div id="flap"></div>
                <div id="env-body"></div>
            </div>
        </div>
    </div>

    <div id="tutorial-ui">
        <div class="phone-anim"></div>
        <p style="padding: 0 40px; margin-bottom: 25px; font-weight: bold;">Arahkan kamera ke foto fisik untuk melihat videonya!</p>
        <button class="btn" id="btn-siap" style="display: inline-block;" onclick="startCamera()">OKE, SIAP! ✨</button>
    </div>

    <a-scene mindar-image="imageTargetSrc: https://pub-02d853231cff4efa92ee6754c646a898.r2.dev/targets.mind%20(5).txt; autoStart: false; uiScanning: no;" vr-mode-ui="enabled: false">
        <a-assets><video id="webVideo" src="https://pub-02d853231cff4efa92ee6754c646a898.r2.dev/video%20abi.mp4" loop="true" crossorigin="anonymous" playsinline></video></a-assets>
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
        <a-entity mindar-image-target="targetIndex: 0" id="targetEntity">
            <a-video id="vDisplay" src="#webVideo"></a-video>
        </a-entity>
    </a-scene>

    <script>
        /* ==========================================================
           1. KONFIGURASI (KODE ASLI ANDA)
           ========================================================== */
        const config = {
            vWidth: 1.1, vHeight: 1.9, vPosY: 0,
            animalType: 'kucing', 
            animalColor: "#808000", 
            colorScreen: "#F5F5DC", 
            colorEnvBody: "#556b2f", 
            colorEnvFlap: "#6b8e23", 
            colorCard: "#ffffff", 
            colorBtn: "#d4af37", 
            colorBtnTxt: "#ffffff",
            colorTutoBg: "#3d4e21",

            // Link Sound Effects (SFX)
            sfxPaper: "https://www.soundjay.com/misc/sounds/paper-slide-1.mp3",
            sfxBtn: "https://www.soundjay.com/buttons/sounds/button-16.mp3",
            sfxNext: "https://www.soundjay.com/buttons/sounds/button-50.mp3",

            slides: [
                { t: "Haii Abiii❤️!", b: "Sanah Helwah Abiii🥳" },
                { t: "Semoga", b: "Diberi umur panjang barokah sehat selalu🤲"},
                { t: "Bunda punya sesuatu buat Abii🫶", b:"Bukan sesuatu yang istimewa sihh😅"},
                { t: "Mau lihat?", b: "Tekan tombol di bawah ya!" }
            ],
            btnLabelNext: "LANJUT",
            btnLabelFinal: "LIHAT KEJUTAN"
        };

        /* ==========================================================
           2. LOGIKA UTAMA & SOUND (KODE ASLI ANDA)
           ========================================================== */
        let slideIndex = 0;
        let isOpened = false;

        // Inisialisasi Audio
        const sndOpen = new Audio(config.sfxPaper);
        const sndClick = new Audio(config.sfxBtn);
        const sndNext = new Audio(config.sfxNext);

        // Preload & Unlock Audio untuk Mobile
        function unlockAudio() {
            [sndOpen, sndClick, sndNext].forEach(s => { 
                s.play().then(() => { s.pause(); s.currentTime = 0; }).catch(() => {});
            });
            window.removeEventListener('click', unlockAudio);
            window.removeEventListener('touchstart', unlockAudio);
        }
        window.addEventListener('click', unlockAudio);
        window.addEventListener('touchstart', unlockAudio);

        function init() {
            document.body.style.backgroundColor = config.colorScreen;
            document.getElementById('main-container').style.backgroundColor = config.colorScreen;
            document.getElementById('env-body').style.backgroundColor = config.colorEnvBody;
            document.getElementById('flap').style.borderTop = `110px solid ${config.colorEnvFlap}`;
            document.getElementById('card').style.backgroundColor = config.colorCard;
            document.getElementById('tutorial-ui').style.backgroundColor = config.colorTutoBg;
            
            const btnNext = document.getElementById('btn-next');
            btnNext.style.backgroundColor = config.colorBtn;
            btnNext.style.color = config.colorBtnTxt;

            const animal = document.getElementById('animal');
            animal.style.backgroundColor = config.animalColor;
            const el = document.getElementById('ear-l'), er = document.getElementById('ear-r');
            if(config.animalType==='kucing'){ el.style.cssText="width:18px;height:18px;top:-9px;left:6px;border-radius:4px 12px 0 0;"; er.style.cssText="width:18px;height:18px;top:-9px;right:6px;border-radius:12px 4px 0 0;"; }

            const v = document.getElementById('vDisplay');
            v.setAttribute('width', config.vWidth); v.setAttribute('height', config.vHeight); v.setAttribute('position', `0 ${config.vPosY} 0`);
            updateText();
        }

        function updateText() {
            document.getElementById('judul-txt').innerText = config.slides[slideIndex].t;
            document.getElementById('isi-txt').innerText = config.slides[slideIndex].b;
            document.getElementById('btn-next').innerText = (slideIndex === config.slides.length - 1) ? config.btnLabelFinal : config.btnLabelNext;
        }

        function openEnvelope() {
            if (!isOpened) {
                sndOpen.play().catch(() => {}); // Play sound buka amplop
                document.getElementById('main-container').classList.add('is-open');
                setTimeout(() => { 
                    document.getElementById('btn-next').style.display = 'inline-block'; 
                }, 800);
                isOpened = true;
            }
        }

        function handleSlide() {
            if (slideIndex < config.slides.length - 1) {
                sndNext.play().catch(() => {}); // Play sound tombol lanjut
                slideIndex++;
                updateText();
            } else {
                sndClick.play().catch(() => {}); // Play sound tombol final
                document.getElementById('main-container').style.display = 'none';
                document.getElementById('tutorial-ui').style.display = 'flex';
            }
        }

        function startCamera() {
    sndClick.play().catch(() => {}); // Play sound tombol start camera
    document.getElementById('tutorial-ui').style.display = 'none';
    
    // --- TAMBAHAN: Unlock Video untuk HP ---
    const vid = document.getElementById('webVideo');
    vid.play().then(() => vid.pause()).catch(() => console.log("Menunggu interaksi"));
    // ---------------------------------------

    document.querySelector('a-scene').systems["mindar-image-system"].start();
}


        init();
        const target = document.querySelector('#targetEntity');
        target.addEventListener("targetFound", () => { document.getElementById('webVideo').play(); });
        target.addEventListener("targetLost", () => { document.getElementById('webVideo').pause(); });
    </script>

    <script>
    document.addEventListener("DOMContentLoaded", function() {
        // Karena kode Anda sudah sangat rapi dalam memisahkan konfigurasi,
        // kita akan mengambil URL dari config yang sudah Anda buat di atas, 
        // atau menggunakan URL eksternal langsung jika config belum dimuat sempurna.
        
        const urlSuaraBuka = "https://www.soundjay.com/misc/sounds/page-flip-01a.mp3"; 
        const urlSuaraKlik = "https://www.soundjay.com/button/sounds/button-16.mp3";    

        const audioAmplopEkstra = new Audio(urlSuaraBuka); 
        const audioTombolEkstra = new Audio(urlSuaraKlik);    

        // Menambahkan pendeteksi klik khusus di luar fungsi openEnvelope()
        const elemenAmplop = document.getElementById('envelope-set');
        if (elemenAmplop) {
            elemenAmplop.addEventListener('click', function() {
                // Mencegah error jika audio belum siap
                try {
                    audioAmplopEkstra.currentTime = 0; 
                    audioAmplopEkstra.play().catch(e => console.log("Menunggu interaksi user:", e));
                } catch(e) {}
            });
        }

        // Menambahkan pendeteksi klik pada semua tombol di luar fungsi handleSlide() dan startCamera()
        const semuaTombol = document.querySelectorAll('.btn');
        semuaTombol.forEach(function(tombol) {
            tombol.addEventListener('click', function() {
                try {
                    audioTombolEkstra.currentTime = 0;
                    audioTombolEkstra.play().catch(e => console.log("Menunggu interaksi user:", e));
                } catch(e) {}
            });
        });
    });
    </script>

</body>
</html>
