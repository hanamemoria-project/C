<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hana Memoria - AR Particle Sensor</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0d0d0d;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }
        
        #ui-layer {
            position: absolute;
            bottom: 5vh;
            left: 5vw;
            right: 5vw;
            color: #e0bfb8;
            pointer-events: none;
            z-index: 10;
        }
        h1 { margin: 0; font-size: clamp(1.3rem, 5vw, 1.8rem); font-weight: 400; letter-spacing: 3px; }
        p { margin: 5px 0 0 0; font-size: clamp(0.85rem, 3vw, 1rem); opacity: 0.8; font-weight: 300; }
        
        /* Indikator Status & Tombol */
        #status-bar {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(224, 191, 184, 0.1);
            border: 1px solid rgba(224, 191, 184, 0.3);
            color: #e0bfb8;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.85rem;
            backdrop-filter: blur(5px);
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .dot {
            width: 8px; height: 8px; border-radius: 50%;
            background-color: #ffaa00; 
            box-shadow: 0 0 8px currentColor;
        }
        .dot.active { background-color: #00ffaa; }
        .dot.error { background-color: #ff0044; }

        #start-btn {
            background: #e0bfb8;
            color: #0d0d0d;
            border: none;
            padding: 6px 12px;
            border-radius: 15px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.8rem;
            transition: opacity 0.2s;
        }
        #start-btn:active { opacity: 0.7; }

        /* Video tersembunyi */
        #webcam {
            position: absolute;
            top: 0; left: 0;
            width: 100px; height: auto;
            opacity: 0;
            pointer-events: none;
        }
    </style>
    
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "gsap": "https://unpkg.com/gsap@3.12.5/index.js",
                "@mediapipe/tasks-vision": "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/vision_bundle.mjs"
            }
        }
    </script>
</head>
<body>

    <div id="status-bar">
        <div class="dot" id="status-indicator"></div>
        <span id="status-text">Menunggu Izin Kamera</span>
        <button id="start-btn">Aktifkan Sensor</button>
    </div>

    <div id="ui-layer">
        <h1>HANA MEMORIA</h1>
        <p>Mengabadikan cerita dalam setiap bingkai.</p>
        <p style="margin-top: 15px; font-style: italic; opacity: 0.6; font-size: clamp(0.75rem, 2.5vw, 0.85rem);">
            (Buka telapak tangan = Bola | Pose "Peace/Victory" = Hati)
        </p>
    </div>

    <video id="webcam" autoplay playsinline></video>

    <script type="module">
        import * as THREE from 'three';
        import gsap from 'gsap';
        import { GestureRecognizer, FilesetResolver } from '@mediapipe/tasks-vision';

        // --- 1. SETUP THREE.JS (GPU ACCELERATED PARTICLES) ---
        const isMobile = () => window.innerWidth < window.innerHeight;
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x0d0d0d, 0.04);
        
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = isMobile() ? 18 : 12;
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        const particleCount = 12000;
        const geometry = new THREE.BufferGeometry();
        const currentPositions = new Float32Array(particleCount * 3);
        
        for(let i = 0; i < particleCount * 3; i++) {
            currentPositions[i] = (Math.random() - 0.5) * 20;
        }
        
        geometry.setAttribute('position', new THREE.BufferAttribute(currentPositions, 3));
        geometry.setAttribute('aTarget', new THREE.BufferAttribute(new Float32Array(currentPositions), 3));

        const uniforms = {
            uProgress: { value: 0.0 },
            uColor: { value: new THREE.Color('#e0bfb8') }, 
            uSizeMultiplier: { value: isMobile() ? 14.0 : 12.0 }
        };

        const vertexShader = `
            attribute vec3 aTarget;
            uniform float uProgress;
            uniform float uSizeMultiplier;
            void main() {
                vec3 finalPos = mix(position, aTarget, uProgress);
                vec4 mvPosition = modelViewMatrix * vec4(finalPos, 1.0);
                gl_PointSize = uSizeMultiplier * (12.0 / -mvPosition.z);
                gl_Position = projectionMatrix * mvPosition;
            }
        `;
        
        const fragmentShader = `
            uniform vec3 uColor;
            void main() {
                vec2 coord = gl_PointCoord - vec2(0.5);
                float distanceToCenter = length(coord);
                if(distanceToCenter > 0.5) discard;
                float strength = 0.08 / (distanceToCenter + 0.05);
                gl_FragColor = vec4(uColor, pow(strength, 1.5) * 0.8);
            }
        `;
        
        const particleMaterial = new THREE.ShaderMaterial({
            uniforms: uniforms, 
            vertexShader, 
            fragmentShader,
            transparent: true, 
            depthWrite: false, 
            blending: THREE.AdditiveBlending
        });
        
        const particles = new THREE.Points(geometry, particleMaterial);
        scene.add(particles);

        // --- 2. FUNGSI BENTUK (SPHERE & HEART) ---
        function getSpherePositions() {
            const arr = new Float32Array(particleCount * 3);
            for(let i = 0; i < particleCount; i++) {
                const phi = Math.acos(-1 + (2 * i) / particleCount);
                const theta = Math.sqrt(particleCount * Math.PI) * phi;
                const r = 4.5; 
                arr[i*3] = r * Math.cos(theta) * Math.sin(phi);
                arr[i*3+1] = r * Math.sin(theta) * Math.sin(phi);
                arr[i*3+2] = r * Math.cos(phi);
            }
            return arr;
        }

        function getHeartPositions() {
            const arr = new Float32Array(particleCount * 3);
            for(let i = 0; i < particleCount; i++) {
                const t = Math.random() * Math.PI * 2;
                const r = Math.sqrt(Math.random()) * 0.5; 
                const x = 16 * Math.pow(Math.sin(t), 3);
                const y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
                arr[i*3] = (x * 0.28) + (Math.random() - 0.5) * r;
                arr[i*3+1] = (y * 0.28) + (Math.random() - 0.5) * r + 1; 
                arr[i*3+2] = (Math.random() - 0.5) * 2.0; 
            }
            return arr;
        }

        // --- 3. LOGIKA TRANSISI ---
        let isAnimating = false;
        let currentShape = 'sphere';

        function updateGestureTarget(newPositionsArray, shapeName) {
            if (isAnimating || currentShape === shapeName) return; 
            isAnimating = true;
            currentShape = shapeName;

            const currentPosAttribute = geometry.attributes.position;
            const targetAttribute = geometry.attributes.aTarget;
            
            for(let i = 0; i < particleCount * 3; i++) {
                currentPosAttribute.array[i] += (targetAttribute.array[i] - currentPosAttribute.array[i]) * uniforms.uProgress.value;
                targetAttribute.array[i] = newPositionsArray[i];
            }
            currentPosAttribute.needsUpdate = true;
            targetAttribute.needsUpdate = true;

            uniforms.uProgress.value = 0;
            gsap.killTweensOf(uniforms.uProgress); 
            gsap.to(uniforms.uProgress, {
                value: 1.0,
                duration: 2.0,
                ease: "expo.inOut",
                onComplete: () => { isAnimating = false; }
            });
        }

        // --- 4. MEDIAPIPE GESTURE RECOGNIZER & CAMERA ---
        let gestureRecognizer;
        const video = document.getElementById('webcam');
        const statusText = document.getElementById('status-text');
        const statusIndicator = document.getElementById('status-indicator');
        const startBtn = document.getElementById('start-btn');

        async function initMediaPipe() {
            startBtn.style.display = 'none';
            statusText.innerText = "Memuat AI Model...";
            statusIndicator.className = 'dot'; 
            statusIndicator.style.backgroundColor = "#ffaa00"; 

            try {
                // Konfigurasi ini memastikan WebAssembly (.wasm) AI ditarik dari CDN yang sama
                const vision = await FilesetResolver.forVisionTasks(
                    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm"
                );
                
                gestureRecognizer = await GestureRecognizer.createFromOptions(vision, {
                    baseOptions: {
                        modelAssetPath: "https://storage.googleapis.com/mediapipe-models/gesture_recognizer/gesture_recognizer/float16/1/gesture_recognizer.task",
                        delegate: "GPU"
                    },
                    runningMode: "VIDEO"
                });

                statusText.innerText = "Meminta Akses Kamera...";
                
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { 
                        facingMode: "user",
                        width: { ideal: 640 },
                        height: { ideal: 480 }
                    } 
                });
                
                video.srcObject = stream;
                video.addEventListener("loadeddata", predictWebcam);

                statusText.innerText = "Sensor Aktif";
                statusIndicator.style.backgroundColor = ""; 
                statusIndicator.className = 'dot active'; 

            } catch (error) {
                console.error("Kamera/AI Error:", error);
                statusText.innerText = "Error: " + error.message; 
                statusIndicator.style.backgroundColor = "";
                statusIndicator.className = 'dot error'; 
                startBtn.style.display = 'block';
                startBtn.innerText = "Coba Lagi";
            }
        }

        startBtn.addEventListener('click', initMediaPipe);

        // --- 5. LOOP DETEKSI GESTUR ---
        let lastVideoTime = -1;
        function predictWebcam() {
            if (video.currentTime !== lastVideoTime) {
                lastVideoTime = video.currentTime;
                
                const results = gestureRecognizer.recognizeForVideo(video, performance.now());
                
                if (results.gestures.length > 0) {
                    const categoryName = results.gestures[0][0].categoryName;
                    
                    if (categoryName === "Open_Palm") {
                        updateGestureTarget(getSpherePositions(), 'sphere');
                    } 
                    else if (categoryName === "Victory" || categoryName === "ILoveYou") {
                        updateGestureTarget(getHeartPositions(), 'heart');
                    }
                }
            }
            requestAnimationFrame(predictWebcam);
        }

        // --- 6. INISIALISASI & RENDER LOOP ---
        setTimeout(() => { updateGestureTarget(getSpherePositions(), 'sphere'); isAnimating = false; }, 300);
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.position.z = isMobile() ? 18 : 12;
            uniforms.uSizeMultiplier.value = isMobile() ? 14.0 : 12.0;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            particles.rotation.y = clock.getElapsedTime() * 0.15;
            renderer.render(scene, camera);
        }

        animate();

    </script>
</body>
</html>
